services:
  # 新增：数据库服务
  db:
    image: postgres:16
    container_name: german-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sitp_german_ai_agent}
    volumes:
      # 利用 PostgreSQL 官方镜像特性，将初始化脚本挂载到该目录，容器首次启动时会自动执行建表和插入数据
      - ./backend/db/sql/001_init_schema.sql:/docker-entrypoint-initdb.d/1_init_schema.sql
      - ./backend/db/sql/002_seed_demo.sql:/docker-entrypoint-initdb.d/2_seed_demo.sql
      - ./backend/db/sql/003_student_schema.sql:/docker-entrypoint-initdb.d/3_student_schema.sql
      - ./backend/db/sql/004_student_seed.sql:/docker-entrypoint-initdb.d/4_student_seed.sql
      - ./backend/db/sql/004_teacher_chat.sql:/docker-entrypoint-initdb.d/4b_teacher_chat.sql
      - ./backend/db/sql/005_agent_memory.sql:/docker-entrypoint-initdb.d/5_agent_memory.sql
      # 数据持久化，防止容器重启后数据丢失
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: german-backend
    ports:
      - "9000:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - LLM_MODEL=${LLM_MODEL:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_API_URL=${QWEN_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234}
      - LMSTUDIO_API_KEY=${LMSTUDIO_API_KEY:-}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-qwen2.5-7b-instruct}
      - INIT_ADMIN_USERNAME=${INIT_ADMIN_USERNAME:-admin}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
      - RESET_ADMIN_PASSWORD_ON_STARTUP=${RESET_ADMIN_PASSWORD_ON_STARTUP:-false}
      - DEMO_TEACHER_PASSWORD=${DEMO_TEACHER_PASSWORD:-}
      - DEMO_STUDENT_PASSWORD=${DEMO_STUDENT_PASSWORD:-}
      - RESET_DEMO_PASSWORDS_ON_STARTUP=${RESET_DEMO_PASSWORDS_ON_STARTUP:-false}
      - ENABLE_DEMO_SEED=${ENABLE_DEMO_SEED:-false}
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      - AUTH_TOKEN_TTL_HOURS=${AUTH_TOKEN_TTL_HOURS:-12}
      - ALLOW_LEGACY_TOKENS=${ALLOW_LEGACY_TOKENS:-false}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
      - DEBUG_LLM_LOGS=${DEBUG_LLM_LOGS:-false}
      # 覆盖后端的默认 DB 连接，将 localhost 替换为 db 容器的服务名
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-sitp_german_ai_agent}
    depends_on:
      - db # 确保数据库先启动
    restart: always

  frontend:
    build: ./frontend
    container_name: german-frontend
    ports:
      - "80:80"
    # 前端为纯静态文件，API 请求由 nginx.conf 反向代理到 backend 容器
    # 无需设置环境变量（Vite 环境变量仅在构建时注入，运行时无效）
    depends_on:
      - backend
    restart: always

# 声明持久化卷
volumes:
  pg_data:
